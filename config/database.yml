default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV.fetch("POSTGRES_USER") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") %>
  # host: <%= ENV.fetch("DATABASE_HOST") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") %>

test:
  <<: *default
  database: ${{ secrets.POSTGRES_DB_TEST }}

production:
  primary: &primary_production
    <<: *default
    database: ${{ secrets.POSTGRES_DB_PROD }}

  cache:
    <<: *primary_production
    database: prod_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: prod_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: prod_cable
    migrations_paths: db/cable_migrate
